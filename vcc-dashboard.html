<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VCC Dashboard</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    height: -webkit-fill-available;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100svh;
    height: -webkit-fill-available;
    overflow: hidden;
    box-sizing: border-box;
  }
  .app-shell {
    background: #FFD100;
    flex: 1;
    display: flex;
    flex-direction: column;
    margin: 19px 6px;
    border-radius: 14px;
    overflow: hidden;
    min-height: 0;
  }
  header {
    background: #000;
    color: #FFD100;
    text-align: center;
    padding: 0.25rem 1rem;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  main {
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
    padding: 0.25rem 0.25rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.2rem;
    font-size: 8px;
    color: #333;
    flex-shrink: 0;
  }
  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #999;
    display: inline-block;
    margin-right: 3px;
  }
  .status-dot.ok { background: #1a9e57; }
  .status-dot.error { background: #d32f2f; }
  .status-dot.loading { background: #f5a623; }
  .setup-row {
    display: flex;
    gap: 4px;
    margin-bottom: 0.25rem;
    flex-shrink: 0;
  }
  input[type="text"] {
    flex: 1;
    padding: 3px 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 10px;
    min-width: 0;
  }
  button {
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #fff;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  button:active { transform: scale(0.98); }
  .tile-groups {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
  }
  .tiles-top {
    flex: 2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 5px;
    min-height: 0;
  }
  .tiles-2col {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    min-height: 0;
  }
  .tiles {
    flex: 1.3;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px;
    min-height: 0;
  }
  .tile {
    border-radius: 11px;
    padding: 0.25rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  .tile .label {
    font-size: 10px;
    margin: 0 0 3px;
    font-weight: 600;
    line-height: 1.15;
  }
  .tile .value {
    font-size: 23px;
    font-weight: 800;
    margin: 0;
    line-height: 1.1;
  }
  .tiles-top .value { font-size: 29px; }
  .tiles-top .label { font-size: 11px; }
  .tiles-2col .value { font-size: 24px; }
  .tiles-2col .label { font-size: 10px; }
  .tile-offered { background: #1a1a1a; color: #FFD100; }
  .tile-answered { background: #1e7d3c; color: #fff; }
  .tile-abandoned { background: #c62828; color: #fff; }
  .tile-waiting { background: #f5a623; color: #1a1a1a; }
  .tile-busy { background: #185fa5; color: #fff; }
  .tile-ready { background: #2e9e5b; color: #fff; }
  .tile-break { background: #8a5cc7; color: #fff; }
  .tile-lunch { background: #b45309; color: #fff; }
  .tile-wrap { background: #555; color: #fff; }
  .tile-longwait { background: #d97706; color: #fff; }
  .tile-abandontime { background: #b91c1c; color: #fff; }
  .tile-asa { background: #0e7490; color: #fff; }
  .controls-row {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 8px;
    color: #333;
    flex-wrap: wrap;
    flex-shrink: 0;
    margin-top: 4px;
  }
  select { padding: 2px 4px; border-radius: 5px; border: 1px solid #ccc; font-size: 8px; }
  .refresh-now { margin-left: auto; padding: 3px 7px; font-size: 8px; }
  .error-msg {
    font-size: 11px;
    color: #c62828;
    margin-top: 0.4rem;
    display: none;
  }
  .updated {
    font-size: 10px;
    color: #444;
  }
</style>
</head>
<body>
<div class="app-shell">

<header>Champion Power Equipment</header>

<main>
  <div class="status-row">
    <span><span class="status-dot" id="status-dot"></span><span id="status-text">Not connected</span></span>
    <span class="updated" id="last-updated"></span>
  </div>

  <div class="setup-row">
    <input id="flow-url" type="text" placeholder="Paste your Power Automate HTTP trigger URL" />
    <button id="connect-btn">Connect</button>
  </div>

  <div class="tile-groups">
  <div class="tiles-top">
    <div class="tile tile-offered">
      <p class="label">Offered</p>
      <p class="value" id="val-offered">–</p>
    </div>
    <div class="tile tile-answered">
      <p class="label">Answered</p>
      <p class="value" id="val-answered">–</p>
    </div>
    <div class="tile tile-abandoned">
      <p class="label">Abandoned</p>
      <p class="value" id="val-abandoned">–</p>
    </div>
    <div class="tile tile-abandontime">
      <p class="label">Avg abandon</p>
      <p class="value" id="val-abandontime">–</p>
    </div>
  </div>

  <div class="tiles">
    <div class="tile tile-waiting">
      <p class="label">Calls waiting</p>
      <p class="value" id="val-waiting">–</p>
    </div>
    <div class="tile tile-longwait">
      <p class="label">Longest wait</p>
      <p class="value" id="val-longwait">–</p>
    </div>
    <div class="tile tile-asa">
      <p class="label">Avg answer time</p>
      <p class="value" id="val-asa">–</p>
    </div>
  </div>

  <div class="tiles-2col">
    <div class="tile tile-busy">
      <p class="label">Agents busy</p>
      <p class="value" id="val-busy">–</p>
    </div>
    <div class="tile tile-ready">
      <p class="label">Agents ready</p>
      <p class="value" id="val-ready">–</p>
    </div>
  </div>

  <div class="tiles-2col">
    <div class="tile tile-break">
      <p class="label">On break</p>
      <p class="value" id="val-break">–</p>
    </div>
    <div class="tile tile-lunch">
      <p class="label">Lunch</p>
      <p class="value" id="val-lunch">–</p>
    </div>
  </div>
  </div>

  <div class="controls-row">
    <label><input type="checkbox" id="auto-refresh" checked style="width:auto;" /> Auto-refresh every</label>
    <select id="refresh-interval">
      <option value="15000">15s</option>
      <option value="30000" selected>30s</option>
      <option value="60000">60s</option>
    </select>
    <button class="refresh-now" id="refresh-now-btn">Refresh now</button>
  </div>

  <p class="error-msg" id="error-msg"></p>
</main>
</div>

<script>
(function() {
  var STORAGE_KEY = 'vcc_flow_url';
  var timer = null;

  var urlInput = document.getElementById('flow-url');
  var connectBtn = document.getElementById('connect-btn');
  var statusDot = document.getElementById('status-dot');
  var statusText = document.getElementById('status-text');
  var lastUpdated = document.getElementById('last-updated');
  var errorMsg = document.getElementById('error-msg');
  var autoRefresh = document.getElementById('auto-refresh');
  var refreshInterval = document.getElementById('refresh-interval');
  var refreshNowBtn = document.getElementById('refresh-now-btn');

  var saved = null;
  try { saved = localStorage.getItem(STORAGE_KEY); } catch (e) {}
  if (saved) urlInput.value = saved;

  function setStatus(state, text) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = text;
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = msg ? 'block' : 'none';
  }

  function round(n) {
    var num = Number(n);
    return isNaN(num) ? '–' : Math.round(num).toLocaleString();
  }

  function formatTime(n) {
    var num = Number(n);
    if (isNaN(num)) return '–';
    var m = Math.floor(num / 60);
    var s = Math.round(num % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function fetchData() {
    var url = urlInput.value.trim();
    if (!url) { showError('Enter your flow URL first.'); return; }
    setStatus('loading', 'Refreshing…');
    showError('');

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    })
      .then(function(r) {
        if (!r.ok) throw new Error('Request failed with status ' + r.status);
        return r.json();
      })
      .then(function(data) {
        document.getElementById('val-offered').textContent = round(data.offered);
        document.getElementById('val-answered').textContent = round(data.answered);
        document.getElementById('val-abandoned').textContent = round(data.abandoned);
        document.getElementById('val-waiting').textContent = round(data.callsWaiting);
        document.getElementById('val-busy').textContent = round(data.agentsBusy);
        document.getElementById('val-ready').textContent = round(data.agentsReady);
        document.getElementById('val-break').textContent = round(data.agentsBreak);
        document.getElementById('val-lunch').textContent = round(data.agentsLunch);
        document.getElementById('val-longwait').textContent = formatTime(data.longestWait);
        document.getElementById('val-abandontime').textContent = formatTime(data.avgAbandonTime);
        document.getElementById('val-asa').textContent = formatTime(data.asa);
        setStatus('ok', 'Connected');
        lastUpdated.textContent = 'Updated ' + new Date().toLocaleTimeString();
        try { localStorage.setItem(STORAGE_KEY, url); } catch (e) {}
      })
      .catch(function(err) {
        setStatus('error', 'Connection failed');
        showError(err.message || 'Could not reach the flow. Check the URL and try again.');
      });
  }

  function scheduleRefresh() {
    if (timer) clearInterval(timer);
    if (autoRefresh.checked) {
      timer = setInterval(fetchData, parseInt(refreshInterval.value, 10));
    }
  }

  connectBtn.addEventListener('click', function() {
    fetchData();
    scheduleRefresh();
  });
  refreshNowBtn.addEventListener('click', fetchData);
  autoRefresh.addEventListener('change', scheduleRefresh);
  refreshInterval.addEventListener('change', scheduleRefresh);

  if (saved) {
    fetchData();
    scheduleRefresh();
  }
})();
</script>

</body>
</html>
